apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    oc delete transporturl custom-url -n $NAMESPACE --ignore-not-found
    oc delete rabbitmquser -n $NAMESPACE -l app.kubernetes.io/managed-by=transporturl --ignore-not-found
    oc delete rabbitmqvhost -n $NAMESPACE -l app.kubernetes.io/managed-by=transporturl --ignore-not-found
    oc delete rabbitmq.rabbitmq.openstack.org rabbitmq-url-custom -n $NAMESPACE --ignore-not-found
    oc delete pvc -n $NAMESPACE -l app.kubernetes.io/name=rabbitmq-url-custom --ignore-not-found
    for pv in $(oc get pv -o jsonpath='{range .items[?(@.spec.claimRef.namespace=="'$NAMESPACE'")]}{.metadata.name}{" "}{.spec.claimRef.name}{"\n"}{end}' | grep rabbitmq-url-custom | awk '{print $1}'); do
      oc delete pv "$pv" --ignore-not-found
    done
