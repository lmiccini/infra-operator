#
# Step 2: Wait for migration to complete — cluster should be ready with Quorum
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - script: |
      set -e
      READY=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-qmigrate -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [ "$READY" != "True" ]; then
        echo "FAIL: RabbitMq CR not ready after migration"
        exit 1
      fi
      echo "PASS: RabbitMq CR is ready"
  - script: |
      set -e
      # Verify queueType updated to Quorum
      QT=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-qmigrate -o jsonpath='{.status.queueType}')
      if [ "$QT" != "Quorum" ]; then
        echo "FAIL: Expected queueType Quorum, got: $QT"
        exit 1
      fi
      echo "PASS: queueType is $QT"
  - script: |
      set -e
      # Verify upgradePhase is cleared
      PHASE=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-qmigrate -o jsonpath='{.status.upgradePhase}')
      if [ -n "$PHASE" ]; then
        echo "FAIL: upgradePhase should be empty, got: $PHASE"
        exit 1
      fi
      echo "PASS: upgradePhase is cleared"
  - script: |
      set -e
      # Verify proxyRequired is set (migration needs proxy for non-durable clients)
      PROXY=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-qmigrate -o jsonpath='{.status.proxyRequired}')
      if [ "$PROXY" != "True" ]; then
        echo "FAIL: Expected proxyRequired=True, got: $PROXY"
        exit 1
      fi
      echo "PASS: proxyRequired is $PROXY"
  - script: |
      set -e
      # Verify proxy sidecar is injected
      CONTAINERS=$(oc get statefulset -n $NAMESPACE rabbitmq-qmigrate-server -o jsonpath='{.spec.template.spec.containers[*].name}')
      if ! echo "$CONTAINERS" | grep -qw "amqp-proxy"; then
        echo "FAIL: Proxy sidecar not found after migration. Containers: $CONTAINERS"
        exit 1
      fi
      echo "PASS: Proxy sidecar present: $CONTAINERS"
