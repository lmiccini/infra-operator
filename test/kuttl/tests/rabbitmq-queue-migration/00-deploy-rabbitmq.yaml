#
# Step 0: Deploy RabbitMq with Mirrored queue type
#
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMq
metadata:
  name: rabbitmq-qmigrate
spec:
  replicas: 3
  containerImage: quay.io/podified-antelope-centos9/openstack-rabbitmq:current-podified
  terminationGracePeriodSeconds: 30
  queueType: Mirrored
