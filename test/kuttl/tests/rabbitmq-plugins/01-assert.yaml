#
# Step 1: Verify additional plugins are enabled in ConfigMap and in RabbitMQ
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
commands:
  - script: |
      set -e
      # Verify plugins ConfigMap contains the additional plugins
      PLUGINS=$(oc get configmap -n $NAMESPACE rabbitmq-plugins-plugins-conf -o jsonpath='{.data.enabled_plugins}')
      if ! echo "$PLUGINS" | grep -q "rabbitmq_shovel"; then
        echo "FAIL: rabbitmq_shovel not found in plugins ConfigMap"
        echo "Plugins: $PLUGINS"
        exit 1
      fi
      if ! echo "$PLUGINS" | grep -q "rabbitmq_shovel_management"; then
        echo "FAIL: rabbitmq_shovel_management not found in plugins ConfigMap"
        echo "Plugins: $PLUGINS"
        exit 1
      fi
      echo "PASS: Additional plugins present in ConfigMap"
  - script: |
      set -e
      # Verify default plugins are also present
      PLUGINS=$(oc get configmap -n $NAMESPACE rabbitmq-plugins-plugins-conf -o jsonpath='{.data.enabled_plugins}')
      for p in rabbitmq_peer_discovery_k8s rabbitmq_prometheus rabbitmq_management; do
        if ! echo "$PLUGINS" | grep -q "$p"; then
          echo "FAIL: Default plugin $p not found in plugins ConfigMap"
          echo "Plugins: $PLUGINS"
          exit 1
        fi
      done
      echo "PASS: Default plugins present in ConfigMap"
  - script: |
      set -e
      # Verify plugins are enabled in the running RabbitMQ node
      POD=$(oc get pods -n $NAMESPACE -l app.kubernetes.io/name=rabbitmq-plugins -o jsonpath='{.items[0].metadata.name}')
      ENABLED=$(oc exec -n $NAMESPACE "$POD" -- rabbitmq-plugins list --enabled --minimal)
      if ! echo "$ENABLED" | grep -q "rabbitmq_shovel"; then
        echo "FAIL: rabbitmq_shovel not enabled in RabbitMQ"
        echo "Enabled plugins: $ENABLED"
        exit 1
      fi
      if ! echo "$ENABLED" | grep -q "rabbitmq_shovel_management"; then
        echo "FAIL: rabbitmq_shovel_management not enabled in RabbitMQ"
        echo "Enabled plugins: $ENABLED"
        exit 1
      fi
      echo "PASS: Additional plugins enabled in RabbitMQ"
