#
# Step 0: Deploy a 3.x RabbitMq cluster with Mirrored queue type
#
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMq
metadata:
  name: rabbitmq-upmir
spec:
  replicas: 1
  containerImage: quay.io/podified-antelope-centos9/openstack-rabbitmq:current-podified
  terminationGracePeriodSeconds: 30
  targetVersion: "3.13"
  queueType: Mirrored
