#
# Step 0: Deploy a 3.x RabbitMq cluster with Mirrored queue type
#
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMq
metadata:
  name: rabbitmq-upmir
spec:
  replicas: 1
  containerImage: quay.io/openstack-k8s-operators/rabbitmq:3.9
  terminationGracePeriodSeconds: 30
  targetVersion: "3.13"
  queueType: Mirrored
