#
# Step 1: Wait for RabbitMq TLS cluster to become ready
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      set -e
      READY=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-tls-url -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [ "$READY" != "True" ]; then
        echo "FAIL: RabbitMq TLS CR not ready"
        exit 1
      fi
      echo "PASS: RabbitMq TLS cluster is ready"
