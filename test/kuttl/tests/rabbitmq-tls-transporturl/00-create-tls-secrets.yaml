#
# Step 0: Create TLS secrets before deploying RabbitMq with TLS enabled.
#
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    set -e
    # Generate self-signed CA
    openssl req -x509 -newkey rsa:2048 -keyout /tmp/ca.key -out /tmp/ca.crt \
      -days 1 -nodes -subj "/CN=rabbitmq-ca" 2>/dev/null

    # Generate server cert signed by CA
    openssl req -newkey rsa:2048 -keyout /tmp/tls.key -out /tmp/tls.csr \
      -nodes -subj "/CN=rabbitmq-tls-url.$NAMESPACE.svc" 2>/dev/null
    openssl x509 -req -in /tmp/tls.csr -CA /tmp/ca.crt -CAkey /tmp/ca.key \
      -CAcreateserial -out /tmp/tls.crt -days 1 2>/dev/null

    # Create TLS secret (tls.crt + tls.key)
    oc create secret generic rabbitmq-tls-url-cert -n $NAMESPACE \
      --from-file=tls.crt=/tmp/tls.crt \
      --from-file=tls.key=/tmp/tls.key \
      --from-file=ca.crt=/tmp/ca.crt

    # Create separate CA secret
    oc create secret generic rabbitmq-tls-url-ca -n $NAMESPACE \
      --from-file=ca.crt=/tmp/ca.crt

    rm -f /tmp/ca.key /tmp/ca.crt /tmp/ca.srl /tmp/tls.key /tmp/tls.crt /tmp/tls.csr
    echo "PASS: TLS secrets created"
