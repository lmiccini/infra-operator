#
# Step 1: Deploy TLS-enabled RabbitMq cluster
#
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMq
metadata:
  name: rabbitmq-tls-url
spec:
  replicas: 1
  containerImage: quay.io/podified-antelope-centos9/openstack-rabbitmq:current-podified
  terminationGracePeriodSeconds: 30
  tls:
    secretName: rabbitmq-tls-url-cert
    caSecretName: rabbitmq-tls-url-ca
