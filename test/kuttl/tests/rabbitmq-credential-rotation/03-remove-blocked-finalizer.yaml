#
# Step 3: Remove the cleanup-blocked finalizer from the orphaned user to approve deletion.
# In production, an admin would do this after confirming the owning service has fully
# switched to the new credentials. The user controller will then auto-delete the CR.
#
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    set -e
    # Get current finalizers and remove only cleanup-blocked
    FINALIZERS=$(oc get rabbitmquser rabbitmq-cred-rot-user-nova -n $NAMESPACE -o jsonpath='{.metadata.finalizers}')
    echo "Current finalizers: $FINALIZERS"

    # Build new finalizer list excluding cleanup-blocked
    NEW_FINALIZERS=$(oc get rabbitmquser rabbitmq-cred-rot-user-nova -n $NAMESPACE -o json | \
      python3 -c "
    import sys, json
    obj = json.load(sys.stdin)
    finalizers = [f for f in obj.get('metadata',{}).get('finalizers',[]) if f != 'rabbitmq.openstack.org/cleanup-blocked']
    print(json.dumps(finalizers))
    ")

    oc patch rabbitmquser rabbitmq-cred-rot-user-nova -n $NAMESPACE --type=merge \
      -p "{\"metadata\":{\"finalizers\":$NEW_FINALIZERS}}"
    echo "PASS: Removed cleanup-blocked finalizer from old user"
