#
# Step 3: Assert old user CR is deleted and user removed from RabbitMQ
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
commands:
  - script: |
      set -e
      # Verify old user CR is gone
      if oc get rabbitmquser -n $NAMESPACE cred-rot-url-nova-user 2>/dev/null; then
        echo "FAIL: Old user CR cred-rot-url-nova-user still exists"
        exit 1
      fi
      echo "PASS: Old user CR cred-rot-url-nova-user deleted"
  - script: |
      set -e
      # Verify old user was deleted from RabbitMQ
      POD=$(oc get pods -n $NAMESPACE -l app.kubernetes.io/name=rabbitmq-cred-rot -o jsonpath='{.items[0].metadata.name}')
      USERS=$(oc exec -n $NAMESPACE "$POD" -- rabbitmqctl list_users)
      if echo "$USERS" | grep -q "nova"; then
        echo "FAIL: Old user 'nova' still exists in RabbitMQ"
        echo "Users: $USERS"
        exit 1
      fi
      echo "PASS: Old user 'nova' was deleted from RabbitMQ"
