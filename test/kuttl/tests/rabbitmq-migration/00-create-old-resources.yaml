#
# Simulate pre-existing resources from the old rabbitmq-cluster-operator.
# First create a dummy ConfigMap to act as the "old owner" (since we don't
# have the RabbitmqCluster CRD), then create all resources with
# ownerReferences pointing to it so that the adoption logic triggers.
#
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    set -euo pipefail
    NAMESPACE="${NAMESPACE}"

    # Create a dummy ConfigMap to act as the old RabbitmqCluster owner
    oc create configmap rabbitmq-migrate-old-owner -n "$NAMESPACE"
    OWNER_UID=$(oc get configmap rabbitmq-migrate-old-owner -n "$NAMESPACE" -o jsonpath='{.metadata.uid}')

    cat <<EOF | oc apply -n "$NAMESPACE" -f -
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: rabbitmq-migrate-server
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/name: rabbitmq-migrate
        app.kubernetes.io/part-of: rabbitmq
      ownerReferences:
      - apiVersion: v1
        kind: ConfigMap
        name: rabbitmq-migrate-old-owner
        uid: "$OWNER_UID"
        controller: true
    spec:
      replicas: 1
      serviceName: rabbitmq-migrate-nodes
      selector:
        matchLabels:
          app.kubernetes.io/name: rabbitmq-migrate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rabbitmq-migrate
        spec:
          containers:
          - name: rabbitmq
            image: quay.io/podified-antelope-centos9/openstack-rabbitmq:current-podified
            ports:
            - containerPort: 5672
              name: amqp
      volumeClaimTemplates:
      - metadata:
          name: persistence
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: rabbitmq-migrate-nodes
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/name: rabbitmq-migrate
        app.kubernetes.io/part-of: rabbitmq
      ownerReferences:
      - apiVersion: v1
        kind: ConfigMap
        name: rabbitmq-migrate-old-owner
        uid: "$OWNER_UID"
        controller: true
    spec:
      type: ClusterIP
      clusterIP: None
      publishNotReadyAddresses: true
      selector:
        app.kubernetes.io/name: rabbitmq-migrate
      ports:
      - name: epmd
        port: 4369
        targetPort: 4369
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: rabbitmq-migrate
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/name: rabbitmq-migrate
        app.kubernetes.io/part-of: rabbitmq
      ownerReferences:
      - apiVersion: v1
        kind: ConfigMap
        name: rabbitmq-migrate-old-owner
        uid: "$OWNER_UID"
        controller: true
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: rabbitmq-migrate
      ports:
      - name: amqp
        port: 5672
        targetPort: 5672
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: rabbitmq-migrate-default-user
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/name: rabbitmq-migrate
        app.kubernetes.io/part-of: rabbitmq
      ownerReferences:
      - apiVersion: v1
        kind: ConfigMap
        name: rabbitmq-migrate-old-owner
        uid: "$OWNER_UID"
        controller: true
    type: Opaque
    stringData:
      username: "existing-user"
      password: "existing-password"
      host: "rabbitmq-migrate.old-namespace.svc"
      port: "5672"
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: rabbitmq-migrate-erlang-cookie
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/name: rabbitmq-migrate
        app.kubernetes.io/part-of: rabbitmq
      ownerReferences:
      - apiVersion: v1
        kind: ConfigMap
        name: rabbitmq-migrate-old-owner
        uid: "$OWNER_UID"
        controller: true
    type: Opaque
    stringData:
      .erlang.cookie: "existing-erlang-cookie-value"
    EOF
