apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    oc delete rabbitmq.rabbitmq.openstack.org rabbitmq-tls -n $NAMESPACE --ignore-not-found
    oc delete pvc -n $NAMESPACE -l app.kubernetes.io/name=rabbitmq-tls --ignore-not-found
    for pv in $(oc get pv -o jsonpath='{range .items[?(@.spec.claimRef.namespace=="'$NAMESPACE'")]}{.metadata.name}{" "}{.spec.claimRef.name}{"\n"}{end}' | grep rabbitmq-tls-server- | awk '{print $1}'); do
      oc delete pv "$pv" --ignore-not-found
    done
    oc delete secret rabbitmq-tls-cert rabbitmq-tls-ca -n $NAMESPACE --ignore-not-found
