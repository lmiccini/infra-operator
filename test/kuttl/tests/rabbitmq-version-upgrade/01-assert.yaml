#
# Step 1: Assert that the upgrade state machine is triggered.
# The controller should enter DeletingResources phase, then transition to WaitingForCluster.
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
commands:
  - script: |
      set -e
      # The upgrade phase should be set (either DeletingResources or WaitingForCluster)
      PHASE=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-upgrade -o jsonpath='{.status.upgradePhase}')
      if [ -z "$PHASE" ]; then
        echo "FAIL: upgradePhase not set after version change"
        exit 1
      fi
      echo "PASS: Upgrade phase is: $PHASE"
  - script: |
      set -e
      # Verify wipeReason is set to VersionUpgrade
      REASON=$(oc get rabbitmq.rabbitmq.openstack.org -n $NAMESPACE rabbitmq-upgrade -o jsonpath='{.status.wipeReason}')
      if [ "$REASON" != "VersionUpgrade" ]; then
        echo "FAIL: Expected wipeReason 'VersionUpgrade', got: '$REASON'"
        exit 1
      fi
      echo "PASS: wipeReason is $REASON"
